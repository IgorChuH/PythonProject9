name: Test and Deploy Django Project

on:
  push:
    branches: [ main, master, develop ]  # ветки, при пуше в которые запускается workflow
  pull_request:
    branches: [ main, master ]           # также запускается при создании PR

jobs:
  test:
    name: Run Django Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: github_actions
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run migrations
      env:
        SECRET_KEY: ${{ secrets.TEST_SECRET_KEY }}
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/github_actions
        DJANGO_SETTINGS_MODULE: config.settings
      run: |
        python manage.py migrate

    - name: Run tests
      env:
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/github_actions
        DJANGO_SETTINGS_MODULE: config.settings
        SECRET_KEY: ${{ secrets.TEST_SECRET_KEY }}
        DEBUG: 'False'
      run: |
        python manage.py test

  deploy:
    name: Deploy to Server
    needs: test  # этот job запускается только после успешного прохождения тестов
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'  # только для основной ветки

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Deploy to server via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SSH_PORT || '22' }}
        script: |
          cd C:\Users\ZIPHAI\Decstop\PythonProject9
          
          # Pull последних изменений
          git pull origin main
          
          # Активируем виртуальное окружение и устанавливаем зависимости
          source venv/bin/activate
          pip install -r requirements.txt
          
          # Применяем миграции
          python manage.py migrate
          
          # Собираем статические файлы
          python manage.py collectstatic --noinput
          
          # Перезапускаем Gunicorn (или другой сервер)
          sudo systemctl restart gunicorn