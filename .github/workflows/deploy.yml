name: Test and Deploy Django Project

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Run Django Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: github_actions
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run migrations
      env:
        SECRET_KEY: ${{ secrets.TEST_SECRET_KEY }}
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/github_actions
        DJANGO_SETTINGS_MODULE: config.settings
      run: python manage.py migrate
    - name: Run tests
      env:
        SECRET_KEY: ${{ secrets.TEST_SECRET_KEY }}
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/github_actions
        DJANGO_SETTINGS_MODULE: config.settings
        DEBUG: 'False'
      run: python manage.py test

  deploy:
    name: Deploy to Windows Server
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Deploy to Windows Server via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SSH_PORT || '22' }}
        script: |
          # Переходим в папку проекта (укажите ваш реальный путь)
          cd C:\Users\ZIPHAI\Decstop\PythonProject9
          
          # Обновляем код
          git pull origin main
          
          # Активируем виртуальное окружение (Windows)
          venv\Scripts\activate
          
          # Устанавливаем зависимости
          pip install -r requirements.txt
          
          # Применяем миграции
          python manage.py migrate
          
          # Собираем статику
          python manage.py collectstatic --noinput
          
          # Перезапускаем приложение (способ зависит от вашего сервера)
          # Вариант 1: если Gunicorn запущен как служба Windows
          net stop gunicorn || exit /b 0
          net start gunicorn